<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Horario de Clases — John John High School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy:       #0a1628;
      --navy2:      #0f1f3d;
      --navy3:      #152647;
      --gold:       #c9a227;
      --gold-l:     #e8c45a;
      --gold-d:     #9a7a1c;
      --gold-faint: rgba(201,162,39,.08);
      --red:        #dc2626;
      --red-l:      #fca5a5;
      --orange:     #ea580c;
      --orange-l:   #fdba74;
      --green-l:    #86efac;
      --cyan-l:     #67e8f9;
      --text:       #e8edf5;
      --text-dim:   #8fa4c8;
      --text-mut:   #3d5478;
      --border:     rgba(201,162,39,.18);
      --border-b:   rgba(201,162,39,.28);
      --r:          10px;
      --r-lg:       16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--navy); color: var(--text); min-height: 100vh;
      background-image:
        linear-gradient(rgba(201,162,39,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,162,39,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* HEADER */
    .site-header {
      background: var(--navy2); border-bottom: 2px solid var(--gold);
      padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
      height: 62px; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .logo-crest {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 20px; border: 2px solid var(--gold-l);
      box-shadow: 0 0 14px rgba(201,162,39,.35);
    }
    .logo-school { font-family:'Cinzel',serif; font-size:13px; color:#fff; font-weight:700; letter-spacing:.04em; }
    .logo-sub    { font-size:10px; color:var(--gold); font-weight:700; letter-spacing:.06em; }
    .header-right { display:flex; align-items:center; gap:8px; }
    .header-badge {
      display:flex; align-items:center; gap:5px; border-radius:20px;
      padding:4px 12px; font-size:11px; font-weight:800; cursor:pointer;
    }
    .hb-urgent { background:rgba(220,38,38,.18); border:1px solid rgba(220,38,38,.4); color:var(--red-l); animation:hbPulse 2s ease-in-out infinite; }
    .hb-warn   { background:rgba(201,162,39,.14); border:1px solid rgba(201,162,39,.35); color:var(--gold-l); }
    @keyframes hbPulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)} 50%{box-shadow:0 0 0 6px rgba(220,38,38,0)} }

    /* BANNER */
    #urgencyBanner {
      display:none; align-items:center; gap:10px; padding:9px 20px;
      font-size:12px; font-weight:700; position:sticky; top:62px; z-index:49;
    }
    #urgencyBanner.level-critical { display:flex; background:#4a0808; border-bottom:1px solid rgba(220,38,38,.5); animation:bPulse 2.5s ease-in-out infinite; }
    #urgencyBanner.level-warn     { display:flex; background:#3a2800; border-bottom:1px solid rgba(201,162,39,.3); }
    @keyframes bPulse { 0%,100%{background:#4a0808} 50%{background:#600d0d} }
    .banner-icon  { font-size:16px; flex-shrink:0; }
    .banner-text  { flex:1; color:var(--text); }
    .banner-text span { color:var(--red-l); }
    #urgencyBanner.level-warn .banner-text span { color:var(--gold-l); }
    .banner-pills { display:flex; gap:6px; flex-wrap:wrap; }
    .banner-pill  { border-radius:20px; padding:2px 10px; font-size:10px; font-weight:800; }
    .bp-red  { background:rgba(220,38,38,.25);  border:1px solid rgba(220,38,38,.4);  color:var(--red-l); }
    .bp-gold { background:rgba(201,162,39,.18); border:1px solid rgba(201,162,39,.35); color:var(--gold-l); }
    .bp-ore  { background:rgba(234,88,12,.18);  border:1px solid rgba(234,88,12,.35);  color:var(--orange-l); }
    .banner-close { background:none; border:none; color:var(--text-mut); font-size:16px; cursor:pointer; padding:0 4px; margin-left:8px; }
    .banner-close:hover { color:var(--text); }

    /* MODAL */
    #weeklyModal {
      position:fixed; inset:0; background:rgba(0,0,0,.82); backdrop-filter:blur(6px);
      z-index:200; display:none; align-items:center; justify-content:center; padding:16px;
    }
    #weeklyModal.active { display:flex; }
    .modal-card {
      background:var(--navy2); border:1px solid var(--border-b); border-radius:var(--r-lg);
      max-width:500px; width:100%;
      box-shadow:0 0 80px rgba(201,162,39,.12),0 24px 60px rgba(0,0,0,.6);
      animation:mIn .25s cubic-bezier(.34,1.56,.64,1); overflow:hidden;
    }
    @keyframes mIn { from{opacity:0;transform:scale(.88) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-header {
      background:linear-gradient(135deg,var(--navy3) 0%,#1e1006 100%);
      border-bottom:2px solid var(--gold); padding:18px 20px;
      display:flex; align-items:center; gap:14px;
    }
    .modal-crest {
      width:48px; height:48px;
      background:linear-gradient(135deg,var(--gold),var(--gold-d));
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:24px; border:2px solid var(--gold-l); box-shadow:0 0 20px rgba(201,162,39,.4);
    }
    .modal-title    { font-family:'Cinzel',serif; font-size:15px; color:#fff; font-weight:700; }
    .modal-subtitle { font-size:11px; color:var(--gold); font-weight:700; margin-top:3px; }
    .modal-close    { margin-left:auto; background:none; border:none; color:var(--text-mut); font-size:18px; cursor:pointer; }
    .modal-body     { padding:20px; }
    .modal-intro {
      font-size:13px; color:var(--text-dim); font-weight:700; margin-bottom:16px;
      padding:10px 14px; background:var(--gold-faint); border:1px solid var(--border); border-radius:var(--r);
    }
    .mei { display:flex; align-items:center; gap:14px; padding:12px 14px; border-radius:var(--r); margin-bottom:8px; border:1px solid transparent; }
    .mei-critical { background:rgba(220,38,38,.08); border-color:rgba(220,38,38,.2); }
    .mei-warn     { background:rgba(234,88,12,.07);  border-color:rgba(234,88,12,.18); }
    .mei-normal   { background:rgba(201,162,39,.06); border-color:var(--border); }
    .mei-emoji    { font-size:24px; flex-shrink:0; }
    .mei-info     { flex:1; min-width:0; }
    .mei-asig     { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:.04em; color:#fff; }
    .mei-fecha    { font-size:11px; color:var(--text-mut); font-weight:700; margin-top:2px; }
    .mei-cont     { font-size:11px; color:var(--text-dim); font-weight:700; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mei-dias     { font-family:'Cinzel',serif; font-size:10px; font-weight:600; flex-shrink:0; text-align:right; }
    .dc  { color:var(--red-l); }
    .dw  { color:var(--orange-l); }
    .dn  { color:var(--gold-l); }
    .modal-footer { padding:0 20px 20px; display:flex; gap:10px; }
    .mbtn {
      flex:1; padding:11px; border-radius:var(--r);
      font-family:'Cinzel',serif; font-size:10px; font-weight:700;
      letter-spacing:.05em; cursor:pointer; border:none; transition:all .15s;
    }
    .mbtn-p { background:linear-gradient(135deg,var(--gold),var(--gold-d)); color:var(--navy); box-shadow:0 4px 16px rgba(201,162,39,.3); }
    .mbtn-p:hover { transform:translateY(-1px); }
    .mbtn-s { background:transparent; border:1px solid var(--border-b); color:var(--text-dim); }

    /* TOASTS */
    #toastStack { position:fixed; bottom:20px; right:20px; z-index:300; display:flex; flex-direction:column-reverse; gap:8px; max-width:320px; }
    .toast-item {
      display:flex; align-items:flex-start; gap:10px; background:var(--navy2);
      border-radius:var(--r); padding:12px 14px; box-shadow:0 8px 32px rgba(0,0,0,.5);
      border-left:3px solid; cursor:pointer;
      animation:tSlide .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes tSlide { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    .t-critical { border-color:var(--red); }
    .t-warn     { border-color:var(--orange); }
    .t-normal   { border-color:var(--gold); }
    .t-emoji  { font-size:18px; flex-shrink:0; margin-top:1px; }
    .t-body   { flex:1; min-width:0; }
    .t-title  { font-size:12px; font-weight:800; color:var(--text); }
    .t-desc   { font-size:11px; color:var(--text-dim); font-weight:700; margin-top:2px; }
    .t-dias   { font-size:10px; font-weight:800; margin-top:3px; }
    .t-close  { background:none; border:none; color:var(--text-mut); font-size:14px; cursor:pointer; }

    /* LAYOUT */
    .page-wrap { max-width:1100px; margin:0 auto; padding:24px 16px 48px; }
    .horario-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
    .horario-title  { font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:#fff; letter-spacing:.04em; display:flex; align-items:center; gap:10px; }
    .gold-line      { display:inline-block; width:4px; height:22px; background:var(--gold); border-radius:2px; box-shadow:0 0 10px rgba(201,162,39,.5); }
    .horario-sub    { font-size:12px; color:var(--text-dim); font-weight:700; margin-top:3px; }

    /* SEMANA NAV */
    .week-nav { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .wbtn {
      background:rgba(201,162,39,.1); border:1px solid var(--border-b);
      border-radius:8px; padding:5px 12px; color:var(--gold); font-size:14px; cursor:pointer; transition:all .15s;
    }
    .wbtn:hover { background:rgba(201,162,39,.2); }
    .week-label {
      font-family:'Cinzel',serif; font-size:10px; color:#fff;
      background:rgba(201,162,39,.08); border:1px solid var(--border);
      border-radius:8px; padding:5px 12px; letter-spacing:.04em;
    }
    .week-badge { border-radius:20px; padding:3px 10px; font-size:11px; font-weight:800; }
    .wb-now  { background:rgba(22,163,74,.1);   border:1px solid rgba(22,163,74,.3);   color:var(--green-l); }
    .wb-next { background:rgba(201,162,39,.1);  border:1px solid var(--border);        color:var(--gold-l); }
    .wb-past { background:rgba(61,84,120,.15);  border:1px solid rgba(61,84,120,.3);   color:var(--text-dim); }

    /* TABLA */
    .table-wrap {
      border-radius:var(--r-lg); border:1px solid var(--border-b);
      overflow:hidden; margin-bottom:16px; overflow-x:auto;
      box-shadow:0 4px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(201,162,39,.1);
    }
    table.sch { width:100%; border-collapse:collapse; min-width:580px; background:var(--navy2); }
    table.sch thead th {
      background:var(--navy3); padding:8px 6px; text-align:center;
      border-bottom:2px solid var(--gold);
      font-family:'Cinzel',serif; font-size:9px; font-weight:600;
      color:var(--gold); letter-spacing:.07em; white-space:nowrap;
    }
    table.sch thead th.th-today { background:#0a1e10; color:var(--cyan-l); border-bottom-color:var(--cyan-l); }
    table.sch thead th.th-hora  { color:var(--text-mut); border-right:2px solid var(--border-b); min-width:92px; }
    table.sch tbody td { padding:5px; text-align:center; border-bottom:1px solid rgba(201,162,39,.06); vertical-align:middle; }
    table.sch tbody td.td-hora { background:rgba(15,31,61,.7); border-right:2px solid var(--border-b); font-size:9px; color:var(--text-mut); font-weight:700; white-space:nowrap; padding:5px 8px; }
    table.sch tbody tr:hover td:not(.td-hora):not(.td-sp) { background:rgba(201,162,39,.035); }
    .tr-rec td  { padding:5px; border-bottom:1px solid rgba(8,145,178,.1); background:rgba(8,145,178,.03); }
    .tr-alm td  { padding:5px; border-bottom:1px solid rgba(201,162,39,.08); background:rgba(201,162,39,.025); }
    .sp-label   { font-family:'Cinzel',serif; font-size:8px; letter-spacing:.07em; text-align:center; color:var(--cyan-l); }
    .tr-alm .sp-label { color:var(--gold); }

    /* Pills */
    .pill {
      display:inline-flex; align-items:center; justify-content:center; gap:4px;
      border-radius:6px; padding:4px 7px; font-size:10px; font-weight:800;
      width:100%; border:1px solid transparent; white-space:nowrap; transition:all .15s;
    }
    .ap-mat { background:rgba(59,130,246,.16);  border-color:rgba(59,130,246,.3);  color:#93c5fd; }
    .ap-len { background:rgba(220,38,38,.14);   border-color:rgba(220,38,38,.28);  color:#fca5a5; }
    .ap-his { background:rgba(201,162,39,.13);  border-color:rgba(201,162,39,.28); color:#e8c45a; }
    .ap-cie { background:rgba(22,163,74,.12);   border-color:rgba(22,163,74,.28);  color:#86efac; }
    .ap-ing { background:rgba(234,88,12,.12);   border-color:rgba(234,88,12,.28);  color:#fdba74; }
    .ap-ef  { background:rgba(8,145,178,.12);   border-color:rgba(8,145,178,.28);  color:var(--cyan-l); }
    .ap-mus { background:rgba(147,51,234,.12);  border-color:rgba(147,51,234,.28); color:#d8b4fe; }
    .ap-art { background:rgba(236,72,153,.12);  border-color:rgba(236,72,153,.28); color:#f9a8d4; }
    .ap-tec { background:rgba(100,116,139,.12); border-color:rgba(100,116,139,.28);color:#cbd5e1; }
    .ap-ori { background:rgba(20,184,166,.12);  border-color:rgba(20,184,166,.28); color:#5eead4; }
    .ap-ec  { background:rgba(251,191,36,.12);  border-color:rgba(251,191,36,.28); color:#fcd34d; }
    .ap-av  { background:rgba(244,114,182,.12); border-color:rgba(244,114,182,.28);color:#f9a8d4; }
    .ap-lib { background:rgba(71,85,105,.1);    border-color:rgba(71,85,105,.25);  color:#94a3b8; }
    .pill.has-eval { animation:eGlow 2.2s ease-in-out infinite; border-color:var(--gold)!important; cursor:pointer; }
    @keyframes eGlow { 0%,100%{box-shadow:0 0 5px rgba(201,162,39,.2)} 50%{box-shadow:0 0 18px rgba(201,162,39,.7),0 0 32px rgba(201,162,39,.15)} }
    .eval-star { display:inline-block; width:5px; height:5px; background:var(--gold); border-radius:50%; box-shadow:0 0 6px var(--gold); flex-shrink:0; }

    /* PANEL EVALS */
    .evals-section { border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; margin-bottom:32px; }
    .evals-toggle  { width:100%; display:flex; align-items:center; justify-content:space-between; background:rgba(201,162,39,.06); border:none; padding:13px 18px; cursor:pointer; color:var(--text); transition:background .15s; }
    .evals-toggle:hover { background:rgba(201,162,39,.1); }
    .evals-tl  { display:flex; align-items:center; gap:10px; font-family:'Cinzel',serif; font-size:10px; color:var(--gold); letter-spacing:.05em; }
    .evals-cnt { background:rgba(201,162,39,.15); border:1px solid var(--border-b); border-radius:20px; padding:2px 10px; font-size:11px; font-family:'Nunito',sans-serif; font-weight:800; color:var(--gold-l); }
    .evals-ch  { color:var(--gold); font-size:14px; transition:transform .25s; }
    .evals-ch.open { transform:rotate(180deg); }
    .evals-body { display:none; }
    .evals-body.open { display:block; }
    .eval-row  { display:flex; align-items:center; gap:14px; padding:12px 18px; border-top:1px solid rgba(201,162,39,.08); cursor:pointer; transition:background .15s; }
    .eval-row:hover { background:rgba(201,162,39,.04); }
    .er-em  { font-size:20px; flex-shrink:0; }
    .er-inf { flex:1; min-width:0; }
    .er-as  { font-family:'Cinzel',serif; font-size:10px; font-weight:600; letter-spacing:.04em; color:#fff; }
    .er-fe  { font-size:11px; color:var(--text-mut); font-weight:700; margin-top:2px; }
    .er-co  { font-size:11px; color:var(--text-dim); font-weight:700; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .er-rt  { text-align:right; flex-shrink:0; }
    .er-di  { font-family:'Cinzel',serif; font-size:9px; font-weight:600; letter-spacing:.04em; margin-bottom:4px; }
    .er-es  { font-size:10px; font-weight:800; border-radius:20px; padding:2px 8px; display:inline-block; }
    .es-pendiente { background:rgba(100,116,139,.15); color:var(--text-dim); }
    .es-estudiado { background:rgba(22,163,74,.1);    color:var(--green-l); }
    .es-rendida   { background:rgba(201,162,39,.1);   color:var(--gold-l); }

    /* POPUP */
    #evalPopup { position:fixed; inset:0; background:rgba(0,0,0,.78); backdrop-filter:blur(5px); display:none; align-items:center; justify-content:center; z-index:250; padding:16px; }
    #evalPopup.active { display:flex; }
    .popup-card { background:var(--navy2); border:1px solid var(--border-b); border-radius:var(--r-lg); padding:22px; max-width:380px; width:100%; box-shadow:0 0 70px rgba(201,162,39,.14); animation:mIn .2s ease; }
    .pp-hd    { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .pp-em    { font-size:28px; }
    .pp-as    { font-family:'Cinzel',serif; font-size:13px; font-weight:700; color:#fff; }
    .pp-fe    { font-size:11px; color:var(--text-mut); font-weight:700; margin-top:3px; }
    .pp-cl    { margin-left:auto; background:none; border:none; color:var(--text-mut); font-size:18px; cursor:pointer; }
    .pp-cont  { background:rgba(201,162,39,.06); border:1px solid var(--border); border-radius:var(--r); padding:12px; font-size:13px; color:#c8d4e6; font-weight:700; line-height:1.6; margin-bottom:12px; }
    .pp-dias  { font-family:'Cinzel',serif; font-size:14px; font-weight:700; text-align:center; padding-top:8px; border-top:1px solid rgba(201,162,39,.1); margin-bottom:16px; }
    .pp-act   { display:flex; gap:10px; }
    .pp-btn   { flex:1; padding:10px; border-radius:8px; font-family:'Cinzel',serif; font-size:10px; font-weight:700; letter-spacing:.05em; border:none; cursor:pointer; transition:all .15s; }
    .pp-btn-p { background:var(--gold); color:var(--navy); box-shadow:0 0 10px rgba(201,162,39,.4); }
    .pp-btn-s { background:transparent; border:1px solid var(--border-b); color:var(--text-dim); }

    /* LEYENDA */
    .leyenda-wrap { margin-top:10px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .leyenda-item { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--text-dim); }
    .legend-dot   { width:8px; height:8px; border-radius:3px; flex-shrink:0; }

    @media(max-width:600px) {
      .logo-school{font-size:11px}
      .logo-crest{width:34px;height:34px;font-size:16px}
      .horario-title{font-size:15px}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-logo">
      <div class="logo-crest">🏛️</div>
      <div>
        <div class="logo-school">JOHN JOHN HIGH SCHOOL</div>
        <div class="logo-sub">HORARIO DE CLASES · 5° BÁSICO</div>
      </div>
    </div>
    <div class="header-right" id="headerBadges"></div>
  </header>

  <div id="urgencyBanner">
    <span class="banner-icon">🔔</span>
    <span class="banner-text" id="bannerText"></span>
    <div class="banner-pills" id="bannerPills"></div>
    <button class="banner-close" onclick="document.getElementById('urgencyBanner').style.display='none'">✕</button>
  </div>

  <div id="weeklyModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-crest">📋</div>
        <div>
          <div class="modal-title">Evaluaciones de la Semana</div>
          <div class="modal-subtitle" id="modalRange">—</div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-intro" id="modalIntro"></div>
        <div id="modalList"></div>
      </div>
      <div class="modal-footer">
        <button class="mbtn mbtn-p" onclick="closeModal()">Ver Horario →</button>
        <button class="mbtn mbtn-s" onclick="closeModal(true)">No mostrar hoy</button>
      </div>
    </div>
  </div>

  <div id="evalPopup">
    <div class="popup-card">
      <div class="pp-hd">
        <span class="pp-em" id="ppEm">📚</span>
        <div><div class="pp-as" id="ppAs">—</div><div class="pp-fe" id="ppFe">—</div></div>
        <button class="pp-cl" onclick="closePopup()">✕</button>
      </div>
      <div class="pp-cont" id="ppCo">—</div>
      <div class="pp-dias" id="ppDi"></div>
      <div class="pp-act"><button class="pp-btn pp-btn-s" onclick="closePopup()">CERRAR</button></div>
    </div>
  </div>

  <div id="toastStack"></div>

  <div class="page-wrap">
    <div class="horario-header">
      <div>
        <div class="horario-title"><span class="gold-line"></span>Horario de Clases</div>
        <div class="horario-sub">John John High School · 5° Básico</div>
      </div>
    </div>

    <div class="week-nav">
      <button class="wbtn" onclick="cambiarSemana(-1)">‹</button>
      <div class="week-label" id="weekLabel">—</div>
      <button class="wbtn" onclick="cambiarSemana(1)">›</button>
      <button class="wbtn" style="font-size:11px;font-weight:800;color:var(--cyan-l);border-color:rgba(8,145,178,.3)" onclick="S.offset=0;calcEvals();refreshUI()">Hoy</button>
      <span class="week-badge" id="weekBadge"></span>
    </div>

    <div id="tableWrap">
      <div class="spinner-wrap" style="text-align: center; padding: 40px; color: var(--text-dim);"><div class="spinner"></div>Conectando con la base de datos...</div>
    </div>

    <div class="leyenda-wrap" id="leyenda"></div>

    <div style="height:32px"></div>

    <div class="evals-section">
      <button class="evals-toggle" onclick="toggleEvals()">
        <div class="evals-tl"><span>PRÓXIMAS EVALUACIONES</span><span class="evals-cnt" id="evalCount">0</span></div>
        <div class="evals-ch" id="evalCh">▼</div>
      </button>
      <div class="evals-body" id="evalsBody"></div>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════
       CONFIGURACIÓN BÁSICA
    ══════════════════════════════════════════ */
    var COLEGIO_ID = '8b14d518-332f-4fea-b78f-df6335c77842';
    var GRADO = 5;

    var DS = {1:'Lunes',2:'Martes',3:'Miércoles',4:'Jueves',5:'Viernes'};
    var BREAKS = [
      { after:2, hora:'09:45 - 10:00', tipo:'rec', label:'Recreo' },
      { after:4, hora:'11:30 - 11:45', tipo:'rec', label:'Recreo' },
      { after:6, hora:'13:15 - 14:00', tipo:'alm', label:'Almuerzo' }
    ];

    var AC = {
      'Matematica':     { e:'📐', c:'ap-mat', col:'#3b82f6' },
      'Lenguaje':       { e:'📖', c:'ap-len', col:'#ef4444' },
      'Historia':       { e:'🏛️', c:'ap-his', col:'#eab308' },
      'Ciencias':       { e:'🔬', c:'ap-cie', col:'#22c55e' },
      'Ingles':         { e:'🇬🇧', c:'ap-ing', col:'#f97316' },
      'Ed. Fisica':     { e:'⚽', c:'ap-ef',  col:'#0891b2' },
      'Musica':         { e:'🎵', c:'ap-mus', col:'#a855f7' },
      'Artes':          { e:'🎨', c:'ap-art', col:'#ec4899' },
      'Tecnologia':     { e:'💻', c:'ap-tec', col:'#64748b' },
      'Orientacion':    { e:'🧭', c:'ap-ori', col:'#14b8a6' },
      'Educ. Cristiana':{ e:'✝️', c:'ap-ec',  col:'#fbbf24' },
      'Artes Visuales': { e:'🖼', c:'ap-av',  col:'#f472b6' },
      'Libre':          { e:'📋', c:'ap-lib', col:'#475569' },
    };

    var S = { matriz:{}, bloques:[], evals:[], offset:0, semEvals:{} };

    /* ══════════════════════════════════════════
       INIT
    ══════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', function() {
      document.addEventListener('keydown', function(e){
        if(e.key==='Escape'){closePopup();closeModal();}
      });
      document.getElementById('evalPopup').addEventListener('click', function(e){
        if(e.target===this)closePopup();
      });
      document.getElementById('weeklyModal').addEventListener('click', function(e){
        if(e.target===this)closeModal();
      });

      refreshUI();
      cargarTodo();
    });

    /* ══════════════════════════════════════════
       CARGA DESDE NUESTRA API EN VERCEL
    ══════════════════════════════════════════ */
    function cargarTodo() {
      // Llamamos a nuestro backend local o en Vercel
      fetch(`/api/horarios?colegio_id=${COLEGIO_ID}&grado=${GRADO}`)
        .then(function(r) {
          if (!r.ok) throw new Error('Error de conexión con el backend HTTP ' + r.status);
          return r.json();
        })
        .then(function(res) {
          // Construir matriz
          var m = {};
          for (var d=1; d<=5; d++){ m[d] = {}; for (var b=1; b<=8; b++) m[d][b] = null; }
          
          res.horarios.forEach(function(c){
            m[c.dia_semana][c.bloque] = c.asignatura;
          });
          
          S.matriz = m;
          S.bloques = res.bloquesConfig;
          S.evals = res.evaluaciones.map(function(e){
            e.fecha_evaluacion = e.fecha_evaluacion.substring(0,10);
            return e;
          });

          calcEvals();
          renderTabla();
          renderLeyenda();
          renderPanel();
          mostrarNotifs();
        })
        .catch(function(err) {
          console.error('[horario]', err);
          document.getElementById('tableWrap').innerHTML = 
            '<div style="text-align:center; padding: 40px;">' +
            '❌ No se pudo cargar la información.<br>' + 
            '<small style="opacity:.6;font-size:10px">' + err.message + '</small></div>';
        });
    }

    /* ══════════════════════════════════════════
       SEMANA
    ══════════════════════════════════════════ */
    function getLunes(offset) {
      var h=new Date(), d=h.getDay(), df=d===0?-6:1-d, l=new Date(h);
      l.setDate(h.getDate()+df+(offset*7));
      l.setHours(0,0,0,0);
      return l;
    }

    function calcEvals() {
      var lu=getLunes(S.offset), vi=new Date(lu);
      vi.setDate(vi.getDate()+4);
      S.semEvals={};
      S.evals.forEach(function(e){
        var f=new Date(e.fecha_evaluacion+'T00:00:00');
        if(f>=lu&&f<=vi){if(!S.semEvals[e.asignatura])S.semEvals[e.asignatura]=[];S.semEvals[e.asignatura].push(e);}
      });
    }

    function cambiarSemana(d){
      S.offset+=d; calcEvals(); refreshUI(); renderTabla();
    }

    function refreshUI() {
      var lu=getLunes(S.offset), vi=new Date(lu);
      vi.setDate(lu.getDate()+4);
      var o={day:'numeric',month:'short'};
      document.getElementById('weekLabel').textContent=
        lu.toLocaleDateString('es-CL',o)+' — '+vi.toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'});

      var b=document.getElementById('weekBadge');
      if(S.offset===0){b.className='week-badge wb-now';b.textContent='✅ Semana actual';}
      else if(S.offset>0){b.className='week-badge wb-next';b.textContent=S.offset===1?'⏭ Próxima semana':'En '+S.offset+' semanas';}
      else{b.className='week-badge wb-past';b.textContent='Hace '+Math.abs(S.offset)+' semana'+(Math.abs(S.offset)>1?'s':'');}
    }

    /* ══════════════════════════════════════════
       TABLA
    ══════════════════════════════════════════ */
    function renderTabla() {
      var hoy=new Date(), dh=hoy.getDay(), lu=getLunes(S.offset);
      var th='<thead><tr><th class="th-hora">HORARIO</th>';
      for(var d=1;d<=5;d++){
        var f=new Date(lu); f.setDate(lu.getDate()+(d-1));
        var eh=S.offset===0&&d===dh;
        th+='<th'+(eh?' class="th-today"':'')+'>'+DS[d]+(eh?' ★':'')+
            '<br><span style="font-family:Nunito,sans-serif;font-size:9px;font-weight:700;color:'+(eh?'var(--cyan-l)':'var(--text-mut)')+'">'+
            f.getDate()+'/'+(f.getMonth()+1)+'</span></th>';
      }
      th+='</tr></thead>';

      var tb='<tbody>';
      for(var blq=1;blq<=8;blq++){
        var br=BREAKS.find(function(b){return b.after===blq-1;});
        if(br){
          var bc=br.tipo==='rec'?'tr-rec':'tr-alm';
          tb+='<tr class="'+bc+'"><td class="td-hora td-sp" style="font-size:9px;color:'+(br.tipo==='rec'?'var(--cyan-l)':'var(--gold)')+'">'+br.hora+'</td>'+
              '<td colspan="5"><div class="sp-label">'+br.label+'</div></td></tr>';
        }

        var cfg=S.bloques.find(function(b){return Number(b.bloque)===blq;})||{};
        tb+='<tr><td class="td-hora">'+(cfg.hora_lj||'')+'</td>';

        for(var di=1;di<=5;di++){
          var asig=(S.matriz[di]&&S.matriz[di][blq])||null;
          var ac=asig?(AC[asig]||{e:'📋',c:'ap-lib',col:'#475569'}):null;
          var te=asig&&S.semEvals[asig]&&S.semEvals[asig].length>0;
          var ehc=S.offset===0&&di===dh;

          tb+='<td'+(ehc?' style="background:rgba(8,145,178,.04)"':'')+'>'+
              (ac?'<div class="pill '+ac.c+(te?' has-eval':'')+'"'+(te?' data-asig="'+asig+'"':'')+'>'+
              (te?'<span class="eval-star"></span>':'')+ac.e+' '+asig.replace('Ed. Fisica','Ed.Física')+'</div>':'')+
              '</td>';
        }
        tb+='</tr>';
      }
      tb+='</tbody>';

      document.getElementById('tableWrap').innerHTML=
        '<div class="table-wrap"><table class="sch">'+th+tb+'</table></div>';

      document.querySelectorAll('.pill.has-eval').forEach(function(el){
        el.addEventListener('click',function(){
          var a=this.dataset.asig;
          if(a&&S.semEvals[a]&&S.semEvals[a].length)abrirPopup(S.semEvals[a][0]);
        });
      });
    }

    /* ══════════════════════════════════════════
       LEYENDA
    ══════════════════════════════════════════ */
    function renderLeyenda(){
      var h='';
      Object.keys(AC).forEach(function(k){
        h+='<div class="leyenda-item"><div class="legend-dot" style="background:'+AC[k].col+'"></div><span>'+k+'</span></div>';
      });
      document.getElementById('leyenda').innerHTML=h;
    }

    /* ══════════════════════════════════════════
       PANEL
    ══════════════════════════════════════════ */
    function renderPanel() {
      document.getElementById('evalCount').textContent=S.evals.length;
      if(S.evals.length===0){
        document.getElementById('evalsBody').innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:var(--text-dim)">No hay evaluaciones programadas.</div>';
        return;
      }
      var h='';
      S.evals.forEach(function(e){
        var ac=AC[e.asignatura]||{e:'📚'};
        var dr=diasR(e.fecha_evaluacion);
        var ec=dr===0?'es-rendida':dr<=3?'es-estudiado':'es-pendiente';
        var et=dr===0?'HOY':dr===1?'MAÑANA':'En '+dr+' días';

        h+='<div class="eval-row" onclick=\'abrirPopup('+JSON.stringify(e)+')\'>'+
             '<div class="er-em">'+ac.e+'</div>'+
             '<div class="er-inf">'+
               '<div class="er-as">'+e.asignatura.toUpperCase()+'</div>'+
               '<div class="er-fe">'+fmtF(e.fecha_evaluacion)+'</div>'+
               '<div class="er-co">'+(e.contenidos||'Sin contenidos especificados')+'</div>'+
             '</div>'+
             '<div class="er-rt">'+
               '<div class="er-di '+(dr<=1?'dc':dr<=3?'dw':'dn')+'">'+et+'</div>'+
               '<div class="er-es '+ec+'">'+(e.estado||'Pendiente').replace('_',' ')+'</div>'+
             '</div>'+
           '</div>';
      });
      document.getElementById('evalsBody').innerHTML=h;
    }

    function toggleEvals(){
      var b=document.getElementById('evalsBody'), c=document.getElementById('evalCh');
      b.classList.toggle('open'); c.classList.toggle('open');
    }

    /* ══════════════════════════════════════════
       NOTIFICACIONES Y MODAL
    ══════════════════════════════════════════ */
    function mostrarNotifs() {
      var crit=[], pronto=[], norm=[];
      S.evals.forEach(function(e){
        var d=diasR(e.fecha_evaluacion);
        if(d<=1) crit.push(e); else if(d<=3) pronto.push(e); else if(d<=7) norm.push(e);
      });

      var badg=document.getElementById('headerBadges');
      if(crit.length) badg.innerHTML+='<div class="header-badge hb-urgent" onclick="toggleEvals()">🚨 '+crit.length+'</div>';
      if(pronto.length) badg.innerHTML+='<div class="header-badge hb-warn" onclick="toggleEvals()">⚠️ '+pronto.length+'</div>';

      var ban=document.getElementById('urgencyBanner');
      if(crit.length){
        ban.className='level-critical';
        document.getElementById('bannerText').innerHTML='<span>¡Urgente!</span> Tienes '+crit.length+' evaluación'+(crit.length>1?'es':'')+' en 24h o menos';
        var p='';
        crit.forEach(function(e){ p+='<span class="banner-pill bp-red">'+(AC[e.asignatura]||{e:'📚'}).e+' '+e.asignatura+'</span>'; });
        document.getElementById('bannerPills').innerHTML=p;
      } else if(pronto.length){
        ban.className='level-warn';
        document.getElementById('bannerText').innerHTML='<span>Atención:</span> Tienes '+pronto.length+' evaluación'+(pronto.length>1?'es':'')+' próxima'+(pronto.length>1?'s':'');
        var pw='';
        pronto.forEach(function(e){ pw+='<span class="banner-pill bp-ore">'+(AC[e.asignatura]||{e:'📚'}).e+' '+e.asignatura+'</span>'; });
        document.getElementById('bannerPills').innerHTML=pw;
      } else if(norm.length){
        ban.style.display='flex'; ban.className='';
        document.getElementById('bannerText').innerHTML='<span>Próximamente</span> tienes '+norm.length+' evaluación'+(norm.length>1?'es':'')+' esta semana';
        var ph3='';
        norm.slice(0,3).forEach(function(e){
          ph3+='<span class="banner-pill bp-gold">'+(AC[e.asignatura]||{e:'📚'}).e+' '+e.asignatura+' — en '+diasR(e.fecha_evaluacion)+' días</span>';
        });
        document.getElementById('bannerPills').innerHTML=ph3;
      }

      // Modal semanal (1 vez por día)
      var todas7=crit.concat(pronto).concat(norm);
      if(todas7.length){
        var hoy=new Date(); hoy.setHours(0,0,0,0);
        var key='jjhs_'+isoD(hoy);
        if(!sessionStorage.getItem(key)) setTimeout(function(){abrirModal(todas7);},700);
        
        todas7.slice(0,4).forEach(function(e,i){
          setTimeout(function(){mostrarToast(e);},2000+i*600);
        });
      }
    }

    function abrirModal(evals){
      var lu=getLunes(S.offset),vi=new Date(lu); vi.setDate(lu.getDate()+4);
      document.getElementById('modalRange').textContent=
        lu.toLocaleDateString('es-CL',{day:'numeric',month:'long'})+' — '+
        vi.toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'});

      var urg=evals.filter(function(e){return diasR(e.fecha_evaluacion)<=1;});
      document.getElementById('modalIntro').innerHTML=urg.length
        ?'🚨 Tienes <strong style="color:var(--red-l)">'+urg.length+' evaluación'+(urg.length>1?'es':' urgente')+'</strong>'+(evals.length-urg.length>0?' y '+(evals.length-urg.length)+' más esta semana.':'.')
        :'📋 Tienes <strong style="color:var(--gold-l)">'+evals.length+' evaluación'+(evals.length>1?'es':'')+' programada'+(evals.length>1?'s':'')+'</strong> para esta semana.';

      var mh='';
      evals.forEach(function(e){
        var dr=diasR(e.fecha_evaluacion);
        var ac=AC[e.asignatura]||{e:'📚'};
        mh+='<div class="mei '+(dr<=1?'mei-critical':dr<=3?'mei-warn':'mei-normal')+'">'+
              '<div class="mei-emoji">'+ac.e+'</div>'+
              '<div class="mei-info">'+
                '<div class="mei-asig">'+e.asignatura.toUpperCase()+'</div>'+
                '<div class="mei-fecha">'+fmtF(e.fecha_evaluacion)+'</div>'+
                '<div class="mei-cont">'+(e.contenidos||'')+'</div>'+
              '</div>'+
              '<div class="mei-dias '+(dr<=1?'dc':dr<=3?'dw':'dn')+'">'+(dr===0?'HOY':dr===1?'MAÑANA':dr+' DÍAS')+'</div>'+
            '</div>';
      });
      document.getElementById('modalList').innerHTML=mh;
      document.getElementById('weeklyModal').classList.add('active');
    }

    function closeModal(hide){
      document.getElementById('weeklyModal').classList.remove('active');
      if(hide){
        var hoy=new Date(); hoy.setHours(0,0,0,0);
        sessionStorage.setItem('jjhs_'+isoD(hoy),'1');
      }
    }

    function mostrarToast(ev){
      var dr=diasR(ev.fecha_evaluacion);
      var tc=dr<=1?'t-critical':dr<=3?'t-warn':'t-normal';
      var dtxt=dr===0?'¡ES HOY!':dr===1?'¡ES MAÑANA!':'En '+dr+' días';
      var ac=AC[ev.asignatura]||{e:'📚'};

      var el=document.createElement('div');
      el.className='toast-item '+tc;
      el.innerHTML=
        '<div class="t-emoji">'+ac.e+'</div>'+
        '<div class="t-body">'+
          '<div class="t-title">'+ev.asignatura+'</div>'+
          '<div class="t-desc">'+(ev.contenidos||'Evaluación programada')+'</div>'+
          '<div class="t-dias '+(dr<=1?'dc':dr<=3?'dw':'dn')+'">'+dtxt+'</div>'+
        '</div>'+
        '<button class="t-close">✕</button>';

      var ts=document.getElementById('toastStack');
      ts.appendChild(el);
      var to=setTimeout(function(){cerrarToast(el);},6000);
      el.onclick=function(e){
        if(e.target.className!=='t-close') abrirPopup(ev);
        clearTimeout(to); cerrarToast(el);
      };
    }

    function cerrarToast(el){
      el.style.opacity='0'; el.style.transform='translateX(40px)'; el.style.transition='all .25s';
      setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},260);
    }

    /* ══════════════════════════════════════════
       POPUP
    ══════════════════════════════════════════ */
    function abrirPopup(ev){
      var ac=AC[ev.asignatura]||{e:'📚'};
      var dr=diasR(ev.fecha_evaluacion);
      document.getElementById('ppEm').textContent=ac.e;
      document.getElementById('ppAs').textContent=ev.asignatura.toUpperCase();
      document.getElementById('ppFe').textContent='📅 '+fmtF(ev.fecha_evaluacion);
      document.getElementById('ppCo').textContent=ev.contenidos||'Sin contenidos especificados';
      var d=document.getElementById('ppDi');
      d.textContent=dr===0?'🚨 ¡ES HOY!':dr===1?'⚠️ ¡ES MAÑANA!':'📅 En '+dr+' días';
      d.className='pp-dias '+(dr<=1?'dc':dr<=3?'dw':'dn');
      document.getElementById('evalPopup').classList.add('active');
    }
    function closePopup(){ document.getElementById('evalPopup').classList.remove('active'); }

    /* ══════════════════════════════════════════
       HELPERS
    ══════════════════════════════════════════ */
    function diasR(f){ var h=new Date();h.setHours(0,0,0,0);return Math.max(0,Math.ceil((new Date(f+'T00:00:00')-h)/864e5)); }
    function isoD(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function fmtF(s){ var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0]; }
  </script>
</body>
</html>
